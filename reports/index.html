<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>면담 준비 보고서</title>
<style>
:root{
  --navy:#14385C; --navy-deep:#0E2A46; --blue:#1B6BB3; --teal:#0E7D6B;
  --bg:#F4F7FA; --ink:#2B3A4A; --muted:#7B8794; --line:#E3E9EF;
  --up:#0E7D6B; --down:#B3401B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);padding:32px 16px;line-height:1.6;}
.wrap{max-width:840px;margin:0 auto;}
.card{background:#fff;border-radius:18px;box-shadow:0 6px 24px rgba(20,56,92,.10);
  padding:36px 40px;margin-bottom:24px;}
h1{color:var(--navy);font-size:26px;margin-bottom:6px;}
h2{color:var(--navy);font-size:19px;margin:28px 0 12px;padding-top:16px;border-top:1px solid var(--line);}
h2:first-child{border-top:none;padding-top:0;margin-top:0;}
h3{color:var(--blue);font-size:15px;margin:16px 0 8px;}
.meta{color:var(--muted);font-size:14px;margin-bottom:4px;}
.backlink{display:inline-block;margin-bottom:18px;color:var(--muted);font-size:14px;text-decoration:none;}
.backlink:hover{color:var(--navy);}
table{width:100%;border-collapse:collapse;margin:10px 0 6px;font-size:14px;}
th,td{border:1px solid var(--line);padding:7px 10px;text-align:center;}
th{background:var(--bg);color:var(--navy);font-weight:700;}
td:first-child, th:first-child{text-align:left;}
ul{margin:6px 0 6px 20px;}
li{margin:4px 0;}
p{margin:6px 0;}
hr{border:none;border-top:1px solid var(--line);margin:18px 0;}
.badge{display:inline-block;font-size:12px;color:#fff;background:var(--blue);
  border-radius:999px;padding:2px 10px;margin-left:8px;vertical-align:middle;}
.case{border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:14px 0;background:#FBFCFE;}
.case-title{font-weight:700;color:var(--navy);margin-bottom:2px;}
.case h2{border-top:none;margin:10px 0 6px;padding-top:0;font-size:14px;color:var(--blue);}
.empty{color:var(--muted);font-style:italic;}
.ai{border-left:4px solid var(--teal);background:#F3FAF8;border-radius:0 12px 12px 0;padding:16px 20px;margin-top:10px;}
.ai ul{margin-left:18px;}
.ai-note{color:var(--muted);font-size:12px;margin-top:12px;font-style:italic;}
.resident-list a{display:block;background:#fff;border-radius:14px;padding:20px 24px;
  margin-bottom:14px;text-decoration:none;color:var(--ink);box-shadow:0 4px 14px rgba(20,56,92,.08);
  transition:transform .1s ease;}
.resident-list a:hover{transform:translateY(-2px);}
.resident-list .name{font-size:19px;font-weight:700;color:var(--navy);}
.resident-list .sub{font-size:13px;color:var(--muted);margin-top:2px;}
#lock{position:fixed;inset:0;background:var(--navy-deep);display:flex;
  align-items:center;justify-content:center;z-index:10;}
#lock .box{background:#fff;border-radius:16px;padding:36px 32px;width:min(320px,90vw);text-align:center;}
#lock input{width:100%;padding:12px;border:1px solid var(--line);border-radius:8px;font-size:16px;margin:14px 0 10px;}
#lock button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--blue);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
#lock button:hover{background:var(--navy);}
#lock .err{color:#B3401B;font-size:13px;min-height:18px;}
#content{display:none;}
</style>
</head>
<body>

<div id="lock">
  <div class="box">
    <div style="font-weight:700;color:#14385C;font-size:17px;margin-bottom:4px;">면담 준비 보고서</div>
    <div style="color:#7B8794;font-size:13px;">비밀번호를 입력하세요</div>
    <form id="lockform">
      <input id="pw" type="password" autocomplete="off" />
      <div class="err" id="err"></div>
      <button type="submit">열기</button>
    </form>
  </div>
</div>

<div id="content" class="wrap">

<div class="card">
<h1>면담 준비 보고서</h1>
<div class="meta">기준: 2026-07 · 전공의를 선택하세요</div>
</div>
<div class="resident-list">
<a href="공순행.html">
  <div class="name">공순행 <span class="badge">1년차</span></div>
  <div class="sub">파견 (2026-07 ~ 2026-08)</div>
</a><a href="이현정.html">
  <div class="name">이현정 <span class="badge">4년차</span></div>
  <div class="sub">본원</div>
</a>
</div>
</div>

<script>
const REQUIRED_HASH = "d19e26833ecb921c610d0a5951da2432bb1a0fe4628190ec7d941696eff286df";
async function sha256(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function reveal(){
  document.getElementById('lock').style.display='none';
  document.getElementById('content').style.display='block';
}
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('mentoring_report_unlocked') === '1') {
    reveal();
    return;
  }
  const form = document.getElementById('lockform');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw').value.normalize('NFC');
    const h = await sha256(pw);
    if (h === REQUIRED_HASH) {
      sessionStorage.setItem('mentoring_report_unlocked', '1');
      reveal();
    } else {
      document.getElementById('err').textContent = '비밀번호가 틀렸습니다.';
      document.getElementById('pw').value = '';
    }
  });
});
</script>

</body>
</html>
