<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주대학교 신경외과 전공의 로그북</title>
<style>
  :root{
    --navy:#14385C;
    --navy-deep:#0E2A46;
    --blue:#1B6BB3;
    --blue-dark:#155a99;
    --teal:#0E7D6B;
    --teal-dark:#0b6a5b;
    --bg:#F4F7FA;
    --ink:#2B3A4A;
    --muted:#7B8794;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:640px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 6px 24px rgba(20,56,92,.10);
  }
  /* 머리글 */
  .header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
    text-align:center;
    padding:44px 28px 38px;
  }
  .header .eyebrow{
    color:#9FB8D2;
    font-size:12px;
    letter-spacing:3px;
    margin-bottom:12px;
  }
  .header h1{
    color:#fff;
    font-size:27px;
    font-weight:700;
    line-height:1.4;
  }
  .header .rule{
    width:48px;height:3px;background:#3E7CB8;
    margin:18px auto 0;border-radius:2px;
  }
  /* 안내 */
  .lead{
    text-align:center;
    padding:32px 28px 6px;
    font-size:16px;
    line-height:1.7;
    color:#4A5A6A;
  }
  .lead b{color:var(--navy);}
  /* 버튼 */
  .buttons{
    padding:26px 32px 10px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .btn{
    display:block;
    text-decoration:none;
    text-align:center;
    color:#fff;
    padding:24px 20px;
    border-radius:14px;
    font-size:21px;
    font-weight:700;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn small{
    display:block;
    font-size:13px;
    font-weight:400;
    margin-top:7px;
    opacity:.85;
  }
  .btn.resident{
    background:var(--blue);
    box-shadow:0 4px 12px rgba(27,107,179,.30);
  }
  .btn.resident:hover{background:var(--blue-dark);transform:translateY(-2px);}
  .btn.faculty{
    background:var(--teal);
    box-shadow:0 4px 12px rgba(14,125,107,.30);
  }
  .btn.faculty:hover{background:var(--teal-dark);transform:translateY(-2px);}
  .btn:focus-visible{outline:3px solid #FFB84D;outline-offset:3px;}
  /* 하단 */
  .footer{
    text-align:center;
    padding:22px 28px 30px;
    font-size:13px;
    line-height:1.7;
    color:var(--muted);
  }
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
    .btn:hover{transform:none;}
  }
  @media (max-width:480px){
    .header h1{font-size:22px;}
    .btn{font-size:18px;padding:20px 16px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">JEJU NATIONAL UNIVERSITY HOSPITAL</div>
      <h1>제주대학교 신경외과<br>전공의 로그북</h1>
      <div class="rule"></div>
    </div>

    <div class="buttons" style="padding-top:34px;">
      <a class="btn resident" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfA02x2y-I3mtoWBGbxanM1r5rcTJXr2SXM3yPLL3KD7pEjpg/viewform">
        전공의 로그북 입력
        <small>수술 참여 기록 · EPA 자가평가</small>
      </a>
      <a class="btn faculty" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSctycOUjmokDceZ-wQUy29RiXTUXlt012bt9FAp9A2BkMqMaA/viewform">
        지도전문의 피드백 입력
        <small>체크리스트 기반 · 1분 이내</small>
      </a>
    </div>

    <p class="footer">
      문의: 책임지도전문의 김준회<br>
      이 페이지를 공용 PC 즐겨찾기에 등록해 두세요.
    </p>
  </div>
</body>
</html>
