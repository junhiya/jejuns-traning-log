<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주대학교 신경외과 전공의 로그북</title>
<style>
  :root{
    --navy:#14385C;
    --navy-deep:#0E2A46;
    --blue:#1B6BB3;
    --blue-dark:#155a99;
    --teal:#0E7D6B;
    --teal-dark:#0b6a5b;
    --bg:#F4F7FA;
    --ink:#2B3A4A;
    --muted:#7B8794;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:auto;}
  body{
    font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:safe center;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:920px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(20,56,92,.12);
  }
  /* 머리글 */
  .header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
    text-align:center;
    padding:44px 36px 36px;
  }
  .header .eyebrow{
    color:#9FB8D2;
    font-size:14px;
    letter-spacing:4px;
    margin-bottom:14px;
  }
  .header h1{
    color:#fff;
    font-size:32px;
    font-weight:700;
    line-height:1.4;
    word-break:keep-all;
  }
  /* 웹에서는 한 줄, 좁은 화면에서만 두 줄로 끊는다 */
  .header h1 .line{display:inline;}
  .header .rule{
    width:60px;height:4px;background:#3E7CB8;
    margin:20px auto 0;border-radius:2px;
  }
  /* 안내 */
  .lead{
    text-align:center;
    padding:24px 28px 4px;
    font-size:16px;
    line-height:1.7;
    color:#4A5A6A;
  }
  .lead b{color:var(--navy);}
  /* 버튼 */
  .buttons{
    padding:28px 48px 12px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .btn{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:88px;
    text-decoration:none;
    text-align:center;
    color:#fff;
    padding:22px 28px;
    border-radius:16px;
    line-height:1.35;
    word-break:keep-all;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  /* 버튼의 주인공 — 한 단계 키우고 나머지를 확실히 낮춰 위계를 만든다 */
  .btn .label{
    display:block;
    font-size:27px;
    font-weight:700;
    line-height:1.2;
    letter-spacing:-.01em;
  }
  /* 작성 주체 — 제목 바로 아래에 바짝 붙여 한 덩어리로 읽히게 */
  .btn .role{
    display:block;
    margin-top:1px;
    line-height:1.15;
    font-size:15px;
    font-weight:400;
    opacity:.75;
    white-space:nowrap;
  }
  .btn small{
    display:block;
    font-size:13px;
    font-weight:400;
    margin-top:7px;
    opacity:.7;
  }
  .btn.resident{
    background:var(--blue);
    box-shadow:0 4px 12px rgba(27,107,179,.30);
  }
  .btn.resident:hover{background:var(--blue-dark);transform:translateY(-2px);}
  .btn.faculty{
    background:var(--teal);
    box-shadow:0 4px 12px rgba(14,125,107,.30);
  }
  .btn.faculty:hover{background:var(--teal-dark);transform:translateY(-2px);}
  .btn.mentoring{
    background:var(--navy);
    box-shadow:0 4px 12px rgba(20,56,92,.30);
  }
  .btn.mentoring:hover{background:var(--navy-deep);transform:translateY(-2px);}
  .btn:focus-visible{outline:3px solid #FFB84D;outline-offset:3px;}
  /* 하단 */
  .footer{
    text-align:center;
    padding:20px 28px 32px;
    font-size:15px;
    line-height:1.8;
    color:var(--muted);
  }
  .memo-link{
    display:inline-block;
    margin-top:14px;
    font-size:12px;
    color:#B4BEC7;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .memo-link:hover{color:var(--navy);}
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
    .btn:hover{transform:none;}
  }
  @media (max-width:600px){
    /* 좁은 화면에서는 위로 붙인다 — 세로 가운데 정렬이면 첫 화면에서 제목이 밀린다 */
    body{align-items:flex-start;}
    .header{padding:32px 24px 28px;}
    .header .eyebrow{font-size:11px;letter-spacing:2px;}
    .header h1{font-size:23px;}
    .header h1 .line{display:block;}
    .buttons{padding:20px 20px 8px;gap:14px;}
    .btn{padding:18px 16px;min-height:72px;}
    .btn .label{font-size:21px;}
    .btn .role{font-size:13px;}
    .btn small{font-size:12px;margin-top:5px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">JEJU NATIONAL UNIVERSITY HOSPITAL</div>
      <h1><span class="line">제주대학교 신경외과</span> <span class="line">수련 로그북</span></h1>
      <div class="rule"></div>
    </div>

    <div class="buttons" style="padding-top:34px;">
      <a class="btn resident" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfA02x2y-I3mtoWBGbxanM1r5rcTJXr2SXM3yPLL3KD7pEjpg/viewform">
        <span class="label">수련 로그북 입력 <span class="role">(전공의 작성)</span></span>
        <small>수술·시술 참여 기록 · EPA 자가평가 · 주간보고</small>
      </a>
      <a class="btn faculty" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSctycOUjmokDceZ-wQUy29RiXTUXlt012bt9FAp9A2BkMqMaA/viewform">
        <span class="label">수술·시술 피드백 입력 <span class="role">(지도전문의 작성)</span></span>
        <small>체크리스트 기반 · 1분 이내</small>
      </a>
      <a class="btn mentoring" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLScAgW0JL7JGWAdWe8yLEpL8kmvvbTQjBIjZuNIB2MIRSLxKaw/viewform">
        <span class="label">면담·지도기록 입력 <span class="role">(지도전문의 작성)</span></span>
        <small>개별면담 · 회진지도 등 기타</small>
      </a>
    </div>

    <p class="footer">
      문의: 책임지도전문의 김준회<br>
      이 페이지를 즐겨찾기에 등록 부탁드립니다.<br>
      <a class="memo-link" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfZwWqIwxlQkfAMwGOu6H1poh7XM3rh89UBh2gR7Wg1XrYHDQ/viewform">관리 메모</a>
      ·
      <a class="memo-link" href="reports/index.html">면담 준비 보고서</a>
    </p>
  </div>
</body>
</html>
