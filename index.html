<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주대학교 신경외과 전공의 로그북</title>
<style>
  :root{
    --navy:#14385C;
    --navy-deep:#0E2A46;
    --blue:#1B6BB3;
    --blue-dark:#155a99;
    --teal:#0E7D6B;
    --teal-dark:#0b6a5b;
    --bg:#F4F7FA;
    --ink:#2B3A4A;
    --muted:#7B8794;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:auto;}
  body{
    font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:safe center;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    /* 글자 덩어리는 300px 남짓인데 카드가 920px이면 버튼이 7:1로 납작해진다.
       좁혀서 비례를 잡고, 남은 세로 여유를 여백으로 돌린다. */
    max-width:680px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(20,56,92,.12);
  }
  /* 머리글 */
  .header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
    text-align:center;
    padding:40px 32px 34px;
  }
  .header .eyebrow{
    color:#9FB8D2;
    font-size:13px;
    letter-spacing:3px;
    margin-bottom:14px;
  }
  .header h1{
    color:#fff;
    font-size:30px;
    font-weight:700;
    line-height:1.4;
    word-break:keep-all;
  }
  /* 웹에서는 한 줄, 좁은 화면에서만 두 줄로 끊는다 */
  .header h1 .line{display:inline;}
  .header .rule{
    width:60px;height:4px;background:#3E7CB8;
    margin:21px auto 0;border-radius:2px;
  }
  /* 안내 */
  .lead{
    text-align:center;
    padding:24px 28px 4px;
    font-size:16px;
    line-height:1.7;
    color:#4A5A6A;
  }
  .lead b{color:var(--navy);}
  /* 버튼 */
  .buttons{
    padding:30px 38px 14px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .btn{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:88px;
    text-decoration:none;
    text-align:center;
    color:#fff;
    /* 설명문 아래가 허전해 보이지 않게 아래 여백을 위보다 살짝 적게 */
    padding:27px 32px 24px;
    border-radius:16px;
    line-height:1.35;
    word-break:keep-all;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  /* 버튼의 주인공 — 한 단계 키우고 나머지를 확실히 낮춰 위계를 만든다 */
  .btn .label{
    display:block;
    font-size:28px;
    font-weight:700;
    line-height:1.2;
    letter-spacing:-.01em;
  }
  /* 작성 주체 — 제목 바로 아래에 바짝 붙여 한 덩어리로 읽히게 */
  .btn .role{
    display:block;
    margin-top:2px;
    line-height:1.15;
    font-size:16px;
    font-weight:400;
    opacity:.75;
    white-space:nowrap;
  }
  /* 설명 — 제목 덩어리와 한 칸 띄워 세 번째 단으로 */
  .btn small{
    display:block;
    font-size:15px;
    font-weight:400;
    margin-top:13px;
    opacity:.72;
  }
  .btn.resident{
    background:var(--blue);
    box-shadow:0 4px 12px rgba(27,107,179,.30);
  }
  .btn.resident:hover{background:var(--blue-dark);transform:translateY(-2px);}
  .btn.faculty{
    background:var(--teal);
    box-shadow:0 4px 12px rgba(14,125,107,.30);
  }
  .btn.faculty:hover{background:var(--teal-dark);transform:translateY(-2px);}
  .btn.mentoring{
    background:var(--navy);
    box-shadow:0 4px 12px rgba(20,56,92,.30);
  }
  .btn.mentoring:hover{background:var(--navy-deep);transform:translateY(-2px);}
  .btn:focus-visible{outline:3px solid #FFB84D;outline-offset:3px;}
  /* 하단 */
  .footer{
    text-align:center;
    padding:23px 28px 31px;
    font-size:15px;
    line-height:1.8;
    color:var(--muted);
  }
  .memo-link{
    display:inline-block;
    margin-top:10px;
    font-size:12px;
    color:#B4BEC7;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .memo-link:hover{color:var(--navy);}
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
    .btn:hover{transform:none;}
  }
  @media (max-width:600px){
    /* 좁은 화면에서는 위로 붙인다 — 세로 가운데 정렬이면 첫 화면에서 제목이 밀린다 */
    body{align-items:flex-start;}
    .header{padding:32px 24px 28px;}
    .header .eyebrow{font-size:11px;letter-spacing:2px;}
    .header h1{font-size:23px;}
    .header h1 .line{display:block;}
    .buttons{padding:20px 20px 8px;gap:14px;}
    .btn{padding:18px 16px;min-height:72px;}
    .btn .label{font-size:21px;}
    .btn .role{font-size:13px;}
    .btn small{font-size:13px;margin-top:8px;}
  }
  /* 세로가 짧은 화면 — 스크롤 없이 한 화면에 담기도록 단계별로 줄인다.
     위계(제목>작성 주체>설명)와 여백 비율은 그대로 두고 크기만 축소한다.
     기본값은 세로가 넉넉한 화면용이고, 아래로 갈수록 한 단씩 조인다. */
  @media (min-width:601px) and (max-height:850px){
    body{padding:20px 16px;}
    .card{max-width:640px;}
    .header{padding:36px 32px 30px;}
    .header .eyebrow{margin-bottom:12px;}
    .header h1{font-size:29px;}
    .header .rule{margin-top:18px;}
    .buttons{padding:26px 34px 12px;gap:15px;}
    .btn{padding:24px 28px 21px;}
    .btn .label{font-size:27px;}
    .btn .role{margin-top:1px;font-size:15px;}
    .btn small{font-size:14px;margin-top:11px;}
    .footer{padding:20px 28px 28px;line-height:1.75;}
  }
  @media (min-width:601px) and (max-height:790px){
    body{padding:16px;}
    .header{padding:28px 32px 24px;}
    .header .eyebrow{margin-bottom:9px;}
    .header h1{font-size:26px;}
    .header .rule{margin-top:13px;}
    .buttons{padding:20px 34px 10px;gap:12px;}
    .btn{padding:19px 28px 16px;min-height:0;}
    .btn .label{font-size:25px;}
    .btn .role{font-size:14px;}
    .btn small{font-size:13px;margin-top:9px;}
    .footer{padding:15px 28px 20px;line-height:1.65;}
    .memo-link{margin-top:8px;}
  }
  @media (min-width:601px) and (max-height:680px){
    body{padding:12px 16px;}
    .header{padding:22px 32px 18px;}
    .header .eyebrow{font-size:12px;letter-spacing:2px;margin-bottom:7px;}
    .header h1{font-size:23px;}
    .header .rule{margin-top:10px;height:3px;}
    .buttons{padding:16px 34px 8px;gap:10px;}
    .btn{padding:14px 24px 12px;}
    .btn .label{font-size:22px;}
    .btn .role{font-size:13px;}
    .btn small{font-size:12px;margin-top:7px;}
    .footer{padding:11px 28px 16px;font-size:14px;line-height:1.55;}
    .memo-link{margin-top:6px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">JEJU NATIONAL UNIVERSITY HOSPITAL</div>
      <h1><span class="line">제주대학교 신경외과</span> <span class="line">수련 로그북</span></h1>
      <div class="rule"></div>
    </div>

    <div class="buttons">
      <a class="btn resident" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfA02x2y-I3mtoWBGbxanM1r5rcTJXr2SXM3yPLL3KD7pEjpg/viewform">
        <span class="label">수련 로그북 입력 <span class="role">(전공의 작성)</span></span>
        <small>수술·시술 참여 기록 · EPA 자가평가 · 주간보고</small>
      </a>
      <a class="btn faculty" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSctycOUjmokDceZ-wQUy29RiXTUXlt012bt9FAp9A2BkMqMaA/viewform">
        <span class="label">수술·시술 피드백 입력 <span class="role">(지도전문의 작성)</span></span>
        <small>체크리스트 기반 · 1분 이내</small>
      </a>
      <a class="btn mentoring" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLScAgW0JL7JGWAdWe8yLEpL8kmvvbTQjBIjZuNIB2MIRSLxKaw/viewform">
        <span class="label">면담·지도기록 입력 <span class="role">(지도전문의 작성)</span></span>
        <small>개별면담 · 회진지도 등 기타</small>
      </a>
    </div>

    <p class="footer">
      문의: 책임지도전문의 김준회<br>
      이 페이지를 즐겨찾기에 등록 부탁드립니다.<br>
      <a class="memo-link" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfZwWqIwxlQkfAMwGOu6H1poh7XM3rh89UBh2gR7Wg1XrYHDQ/viewform">관리 메모</a>
      ·
      <a class="memo-link" href="reports/index.html">면담 준비 보고서</a>
    </p>
  </div>
</body>
</html>
