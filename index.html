<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주대학교 신경외과 수련 로그북</title>
<style>
  :root{
    --navy:#14385C;
    --navy-deep:#0E2A46;
    --blue:#1B6BB3;
    --blue-dark:#155a99;
    --teal:#0E7D6B;
    --teal-dark:#0b6a5b;
    --bg:#F4F7FA;
    --ink:#2B3A4A;
    --muted:#7B8794;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .card{
    width:100%;
    max-width:920px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(20,56,92,.12);
  }
  /* 머리글 */
  .header{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
    text-align:center;
    padding:64px 36px 54px;
  }
  .header .eyebrow{
    color:#9FB8D2;
    font-size:15px;
    letter-spacing:4px;
    margin-bottom:16px;
  }
  .header h1{
    color:#fff;
    font-size:40px;
    font-weight:700;
    line-height:1.4;
  }
  .header .rule{
    width:60px;height:4px;background:#3E7CB8;
    margin:24px auto 0;border-radius:2px;
  }
  /* 안내 */
  .lead{
    text-align:center;
    padding:32px 28px 6px;
    font-size:16px;
    line-height:1.7;
    color:#4A5A6A;
  }
  .lead b{color:var(--navy);}
  /* 버튼 */
  .buttons{
    padding:44px 48px 16px;
    display:flex;
    flex-direction:column;
    gap:24px;
  }
  .btn{
    display:block;
    text-decoration:none;
    text-align:center;
    color:#fff;
    padding:38px 28px;
    border-radius:16px;
    font-size:30px;
    font-weight:700;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn small{
    display:block;
    font-size:16px;
    font-weight:400;
    margin-top:10px;
    opacity:.85;
  }
  .btn.resident{
    background:var(--blue);
    box-shadow:0 4px 12px rgba(27,107,179,.30);
  }
  .btn.resident:hover{background:var(--blue-dark);transform:translateY(-2px);}
  .btn.faculty{
    background:var(--teal);
    box-shadow:0 4px 12px rgba(14,125,107,.30);
  }
  .btn.faculty:hover{background:var(--teal-dark);transform:translateY(-2px);}
  .btn:focus-visible{outline:3px solid #FFB84D;outline-offset:3px;}
  /* 하단 */
  .footer{
    text-align:center;
    padding:30px 28px 44px;
    font-size:15px;
    line-height:1.8;
    color:var(--muted);
  }
  .memo-link{
    display:inline-block;
    margin-top:14px;
    font-size:12px;
    color:#B4BEC7;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .memo-link:hover{color:var(--navy);}
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
    .btn:hover{transform:none;}
  }
  @media (max-width:600px){
    .header{padding:44px 28px 38px;}
    .header h1{font-size:26px;}
    .buttons{padding:32px 24px 10px;}
    .btn{font-size:20px;padding:24px 18px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">JEJU NATIONAL UNIVERSITY HOSPITAL</div>
      <h1>제주대학교 신경외과 수련 로그북</h1>
      <div class="rule"></div>
    </div>

    <div class="buttons" style="padding-top:34px;">
      <a class="btn resident" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfA02x2y-I3mtoWBGbxanM1r5rcTJXr2SXM3yPLL3KD7pEjpg/viewform">
        전공의 로그북 입력
        <small>수술 참여 기록 · EPA 자가평가</small>
      </a>
      <a class="btn faculty" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSctycOUjmokDceZ-wQUy29RiXTUXlt012bt9FAp9A2BkMqMaA/viewform">
        지도전문의 피드백 입력
        <small>체크리스트 기반 · 1분 이내</small>
      </a>
    </div>

    <p class="footer">
      문의: 책임지도전문의 김준회<br>
      이 페이지를 공용 PC 즐겨찾기에 등록해 두세요.<br>
      <a class="memo-link" target="_blank"
         href="https://docs.google.com/forms/d/e/1FAIpQLSfZwWqIwxlQkfAMwGOu6H1poh7XM3rh89UBh2gR7Wg1XrYHDQ/viewform">관리 메모</a>
    </p>
  </div>
</body>
</html>
